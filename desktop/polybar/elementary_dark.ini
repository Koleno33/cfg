[global/wm]
margin-bottom = 0
margin-top = 0

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[bar/main]
monitor =
monitor-fallback =
monitor-strict = false
override-redirect = false
bottom = false
fixed-center = true
width = 100%
height = 30
offset-x = 0
offset-y = 0
background = ${color.bg}
foreground = ${color.fg}
radius-top = 0.0
radius-bottom = 0.0
padding = 3
module-margin-left = 3
module-margin-right = 3

font-0 = "Droid Sans:size=9:weight=bold;3"
font-1 = "Iosevka Nerd Font:size=12;3"

modules-left = i3
modules-center = date
modules-right = memory network

separator =
dim-value = 1.0
wm-name =
locale =
enable-ipc = true
click-left =
click-middle =
click-right =
scroll-up =
scroll-down =
double-click-left =
double-click-middle =
double-click-right =
cursor-click =
cursor-scroll =

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; Application Settings

[settings]
pseudo-transparency = false

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; Colors

[color]
bg = #80000000
fg = #EAEAEA
fg-alt = #9C9C9C
trans = #00000000
white = #FFFFFF
black = #000000
red = #e53935
pink = #d81b60
purple = #8e24aa
deep-purple = #5e35b1
indigo = #3949ab
blue = #1e88e5
light-blue = #039be5
cyan = #00acc1
teal = #00897b
green = #43a047
light-green = #7cb342
lime = #c0ca33
yellow = #fdd835
amber = #ffb300
orange = #fb8c00
deep-orange = #f4511e
brown = #6d4c41
grey = #757575
blue-gray = #546e7a

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
label-mode = %mode:🔒%
label-mode-padding = 1
label-focused = %index%
label-focused-background = ${color.grey}
label-focused-foreground = ${color.bg}
label-focused-padding = 3
label-unfocused = %index%
label-unfocused-padding = 3
label-visible = %index%
label-visible-background = ${color.fg-alt}
label-visible-foreground = ${color.bg}
label-visible-padding = 3
label-urgent = %index%
label-urgent-background = ${color.orange}
label-urgent-padding = 3

[module/date]
type = internal/date
interval = 1.0
time = "%d/%m/%Y %H:%M"
format = <label>
label = %time%

[module/memory]
type = internal/memory
interval = 2
#format-prefix = "RAM: "
format-prefix-foreground = ${color.fg-alt}
label = %gb_used%

[module/network]
type = internal/network
interface = enp3s0
interval = 3.0
accumulate-stats = true
unknown-as-up = true
format-connected = <label-connected>
label-connected = %local_ip%
format-disconnected = <label-disconnected>
label-disconnected = Нет сети
label-disconnected-foreground = ${color.fg-alt}
